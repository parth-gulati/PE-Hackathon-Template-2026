groups:
  - name: url-shortener-alerts
    rules:
      - alert: ServiceDown
        expr: up{job="flask-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "App instance {{ $labels.instance }} is down"
          description: "{{ $labels.instance }} has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: sum(rate(http_errors_total[2m])) / sum(rate(http_requests_total[2m])) > 0.10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Error rate exceeds 10%"
          description: "Error rate has been above 10% for 2 minutes. Current value: {{ $value | humanizePercentage }}"

      - alert: HighLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[2m])) by (le)) > 3
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "p95 latency exceeds 3 seconds"
          description: "95th percentile response time has been above 3s for 2 minutes."
